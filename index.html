<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeamento de Serviços Públicos - MZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #2c3e50;
            --nav-bg: rgba(255, 255, 255, 0.2);
            --btn-bg: rgba(255, 255, 255, 0.3);
            --accent: #3498db;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.4);
            --btn-bg: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        body { height: 200vh; background-color: var(--bg-color); color: var(--text-color); padding-top: 100px; }

        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 50px; background: var(--nav-bg); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000; transition: top 0.4s ease;
        }

        /* O Globo Real como Logo */
        .logo { font-size: 2rem; cursor: pointer; user-select: none; }
        
        .nav-links { display: flex; align-items: center; gap: 15px; }
        
        /* Botões com fundo e efeito de dedo apontando (pointer) */
        .nav-links a, .nav-links button {
            text-decoration: none; color: var(--text-color); background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            padding: 10px 20px; border-radius: 12px; font-size: 0.95rem; font-weight: 500;
        }

        /* Efeito Hover Topo */
        .nav-links a:hover, .nav-links button:hover {
            background: var(--accent); color: white; transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }

        .btn-login { background: #2c3e50 !important; color: white !important; }
        .dark-mode .btn-login { background: var(--accent) !important; }
    </style>
</head>
<body>

    <nav id="navbar" class="navbar">
        <!-- Globo real inserido aqui -->
        <div class="logo">🌍</div>
        
        <div class="nav-links">
            <a href="#inicio" data-i18n="inicio">Início</a>
            <a href="Sobre.html" data-i18n="sobre">Sobre Nós</a>
            <button id="theme-toggle"><i class="fas fa-adjust"></i></button>
            <button id="lang-toggle"><i class="fas fa-globe"></i></button>
            <a href="/login" class="btn-login" data-i18n="login">Login</a>
        </div>
    </nav>

    <script>
        // Lógica de Scroll (Navbar some e aparece)
        let lastScrollTop = 0;
        const navbar = document.getElementById("navbar");
        window.addEventListener("scroll", () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            navbar.style.top = (scrollTop > lastScrollTop && scrollTop > 70) ? "-80px" : "0";
            lastScrollTop = scrollTop;
        });

        // Alternar Tema
        document.getElementById("theme-toggle").addEventListener("click", () => document.body.classList.toggle("dark-mode"));

        // Tradução simples
        const translations = {
            "pt-mz": { inicio: "Início", sobre: "Sobre Nós", login: "Login" },
            "en": { inicio: "Home", sobre: "About Us", login: "Login" }
        };

        let currentLang = "pt-mz";
        document.getElementById("lang-toggle").addEventListener("click", () => {
            currentLang = (currentLang === "pt-mz") ? "en" : "pt-mz";
            document.querySelectorAll("[data-i18n]").forEach(el => {
                el.innerText = translations[currentLang][el.getAttribute("data-i18n")];
            });
        });
    </script>
</body>
</html>
