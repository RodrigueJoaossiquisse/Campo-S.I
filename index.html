<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapeamentoMZ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg-color:#f0f2f5;
    --text-color:#2c3e50;
    --nav-bg:rgba(255,255,255,0.3);
    --btn-bg:rgba(255,255,255,0.4);
    --accent:#3498db;
}

body.dark-mode{
    --bg-color:#121212;
    --text-color:#fff;
    --nav-bg:rgba(0,0,0,0.5);
    --btn-bg:rgba(255,255,255,0.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:var(--bg-color);
    color:var(--text-color);
    padding-top:80px;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    display:flex;
    align-items:center;
    padding:0 15px;
    background:var(--nav-bg);
    backdrop-filter:blur(15px);
    z-index:1000;
}

.logo{
    font-size:1.5rem;
    font-weight:bold;
}

.nav-links{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.nav-links a,
.nav-links button{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    background:var(--btn-bg);
    color:var(--text-color);
    cursor:pointer;
    text-decoration:none;
}

/* HAMBURGUER */
#menu-toggle{
    display:none;
    margin-left:auto;
    padding:10px;
    background:var(--accent);
    border:none;
    border-radius:8px;
    color:#fff;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:70px;
    width:95px;
    height:calc(100vh - 70px);
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    gap:25px;
}

.sidebar-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:11px;
    text-align:center;
    cursor:pointer;
}

.sidebar-item img{
    width:55px;
    height:55px;
    border-radius:12px;
    object-fit:cover;
}

/* MAPA */
.map-container{
    margin-left:100px;
    padding:20px;
}

iframe{
    width:100%;
    height:80vh;
    border:none;
    border-radius:15px;
}

/* FOOTER */
footer{
    margin-left:100px;
    padding:30px;
    text-align:center;
    background:linear-gradient(270deg,#3498db,#9b59b6,#e74c3c,#27ae60);
    color:white;
}

/* RESPONSIVO */
@media(max-width:700px){

    #menu-toggle{
        display:block;
    }

    .nav-links{
        display:none;
        position:absolute;
        top:70px;
        right:0;
        flex-direction:column;
        background:var(--nav-bg);
        padding:15px;
    }

    .nav-links.active{
        display:flex;
    }

    .sidebar{
        display:none;
    }

    .map-container,
    footer{
        margin-left:0;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

<div class="logo">🌍 MapeamentoMZ</div>

<button id="menu-toggle">☰</button>

<div class="nav-links" id="nav-links">
    <a href="#">Início</a>
    <a href="Sobre.html">Sobre</a>
    <a href="login.html" class="btn-login">Login</a>
    <button id="theme-toggle">🌓</button>
</div>

</nav>

<!-- SIDEBAR -->
<div class="sidebar">

    <!-- ESCOLA -->
    <div class="sidebar-item">
        <img src="img/images escola.png">
        <span>Escola</span>
    </div>

    <!-- SAÚDE -->
    <div class="sidebar-item">
        <img src="img/images.jfif">
        <span>Saúde</span>
    </div>

    <!-- INSTITUIÇÃO DO ESTADO -->
    <div class="sidebar-item">
        <img src="img/Instituicao do estado.png">
        <span>Estado</span>
    </div>

</div>

<!-- MAPA -->
<div class="map-container">

<iframe src="https://www.google.com/maps/d/embed?mid=1GIonsWg5ZrtNMCKzeDmF88BB5UsmdUQ"></iframe>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 MapeamentoMZ</p>
<p>Desenvolvido por Alfredo • Rodrigues • Shelcio</p>
</footer>

<script>

document.getElementById("menu-toggle").onclick = () => {
    document.getElementById("nav-links").classList.toggle("active");
};

document.getElementById("theme-toggle").onclick = () => {
    document.body.classList.toggle("dark-mode");
};

</script>

</body>
</html>
