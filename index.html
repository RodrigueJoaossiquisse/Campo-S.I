<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeamento de Serviços Públicos - MZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f0f2f5; --text-color: #2c3e50; --nav-bg: rgba(255, 255, 255, 0.2); --btn-bg: rgba(255, 255, 255, 0.3); --accent: #3498db; }
        body.dark-mode { --bg-color: #121212; --text-color: #ffffff; --nav-bg: rgba(0, 0, 0, 0.4); --btn-bg: rgba(255, 255, 255, 0.1); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-top: 100px; }

        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background: var(--nav-bg); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000; transition: top 0.4s ease;
        }

        .logo { font-size: 1.5rem; cursor: pointer; }
        
        /* Layout dos links */
        .nav-links { display: flex; align-items: center; gap: 8px; }
        
        .nav-links a, .nav-links button {
            text-decoration: none; color: var(--text-color); background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
        }

        .nav-links a:hover, .nav-links button:hover { background: var(--accent); color: white; transform: translateY(-3px); }

        /* Ajuste para celular (telas menores que 600px) */
        @media (max-width: 600px) {
            .navbar { padding: 0 10px; }
            .nav-links { gap: 4px; }
            .nav-links a, .nav-links button { padding: 6px 8px; font-size: 0.75rem; }
            .btn-login { padding: 6px 10px !important; }
        }

        .btn-login { background: #2c3e50 !important; color: white !important; }
        .dark-mode .btn-login { background: var(--accent) !important; }
    </style>
</head>
<body>

    <nav id="navbar" class="navbar">
        <div class="logo">🌍</div>
        
        <div class="nav-links">
            <a href="#inicio" data-i18n="inicio">Início</a>
            <a href="Sobre.html" data-i18n="sobre">Sobre</a>
            <button id="theme-toggle"><i class="fas fa-adjust"></i></button>
            <button id="lang-toggle"><i class="fas fa-globe"></i></button>
            <a href="/login" class="btn-login" data-i18n="login">Login</a>
        </div>
    </nav>

    <script>
        // Scroll Navbar
        let lastScrollTop = 0;
        const navbar = document.getElementById("navbar");
        window.addEventListener("scroll", () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            navbar.style.top = (scrollTop > lastScrollTop && scrollTop > 70) ? "-80px" : "0";
            lastScrollTop = scrollTop;
        });

        // Tema
        document.getElementById("theme-toggle").addEventListener("click", () => document.body.classList.toggle("dark-mode"));

        // Tradução
        const translations = {
            "pt-mz": { inicio: "Início", sobre: "Sobre", login: "Login" },
            "en": { inicio: "Home", sobre: "About", login: "Login" }
        };

        let currentLang = "pt-mz";
        document.getElementById("lang-toggle").addEventListener("click", () => {
            currentLang = (currentLang === "pt-mz") ? "en" : "pt-mz";
            document.querySelectorAll("[data-i18n]").forEach(el => {
                el.innerText = translations[currentLang][el.getAttribute("data-i18n")];
            });
        });
    </script>
</body>
</html>
