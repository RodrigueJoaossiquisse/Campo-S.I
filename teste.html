<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeamento MZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f0f2f5; --text-color: #2c3e50; --nav-bg: rgba(255, 255, 255, 0.3); --btn-bg: rgba(255, 255, 255, 0.4); --accent: #3498db; }
        body.dark-mode { --bg-color: #121212; --text-color: #ffffff; --nav-bg: rgba(0, 0, 0, 0.5); --btn-bg: rgba(255, 255, 255, 0.1); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-top: 80px; min-height: 100vh; display: flex; flex-direction: column; }

        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center;
            padding-left: 15px; padding-right: 15px; background: var(--nav-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .nav-links { display: flex; align-items: center; gap: 12px; margin-left: auto; }
        
        .nav-links a, .nav-links button {
            text-decoration: none; color: var(--text-color); background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
            padding: 8px 15px; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
        }

        .nav-links a:hover, .nav-links button:hover {
            background: var(--accent); color: white; transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        #menu-toggle { display: none; background: var(--accent); color: white; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; }

        /* Estilo do Mapa */
        .map-container {
            width: 90%; max-width: 1200px; margin: 40px auto;
            padding: 10px; background: rgba(255, 255, 255, 0.5);
            border-radius: 25px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .dark-mode .map-container { background: rgba(255, 255, 255, 0.05); }

        /* Rodapé Líquido */
        footer {
            margin-top: auto; padding: 40px 20px; text-align: center; color: white;
            background: linear-gradient(270deg, #3498db, #9b59b6, #e74c3c, #27ae60);
            background-size: 800% 800%; animation: liquidFlow 15s ease infinite;
        }
        @keyframes liquidFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        @media (max-width: 500px) {
            #menu-toggle { display: block; margin-left: auto; }
            .nav-links { 
                display: none; position: absolute; top: 70px; right: 0; 
                flex-direction: column; background: var(--nav-bg); backdrop-filter: blur(15px);
                padding: 20px; border-radius: 0 0 0 15px; gap: 15px; width: 160px;
            }
            .nav-links.active { display: flex; }
        }

        .btn-login { background: #2c3e50 !important; color: white !important; }
        .dark-mode .btn-login { background: var(--accent) !important; }
    </style>
</head>
<body>

    <nav id="navbar" class="navbar">
        <div class="logo"><span>🌍</span> MapeamentoMZ</div>
        <button id="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="nav-links">
            <a href="#inicio">Início</a>
            <a href="Sobre.html">Sobre</a>
            <button id="theme-toggle"><i class="fas fa-adjust"></i></button>
            <button id="lang-toggle"><i class="fas fa-globe"></i></button>
            <a href="login.html" class="btn-login">Login</a>
        </div>
    </nav>

    <main class="map-container">
        <iframe 
            src="https://www.google.com/maps/d/embed?mid=14xEx7tGwphuPCgAhibJB6lnlieeJg9Q" 
            width="100%" height="500px" style="border:0; border-radius: 20px;" 
            allowfullscreen="" loading="lazy">
        </iframe>
    </main>

    <footer>
        <p>&copy; 2026 <strong>MapeamentoMZ</strong>. Todos os direitos reservados.</p>
        <p style="margin-top: 10px;">Desenvolvido por: <strong>Alfredo • Rodrigues • Shelcio</strong></p>
    </footer>

    <script>
        const navLinks = document.getElementById("nav-links");
        const menuToggle = document.getElementById("menu-toggle");

        menuToggle.addEventListener("click", (e) => { e.stopPropagation(); navLinks.classList.toggle("active"); });
        document.addEventListener("click", (e) => { if (!navLinks.contains(e.target) && e.target !== menuToggle) navLinks.classList.remove("active"); });
        document.getElementById("theme-toggle").addEventListener("click", () => document.body.classList.toggle("dark-mode"));
    </script>
</body>
</html>
